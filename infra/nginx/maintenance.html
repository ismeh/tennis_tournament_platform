<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento - PuntoMatch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #0891b2 50%, #0ea5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }
        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 500px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .refresh-note {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#127951;</div>
        <h1>Mantenimiento en curso</h1>
        <p>Estamos realizando mejoras en la plataforma. Volveremos en breve.</p>
        <div class="spinner"></div>
        <p class="refresh-note">La pagina se recargara automaticamente.</p>
    </div>
    <script>
        setTimeout(function() { location.reload(); }, 30000);
    </script>
</body>
</html>
