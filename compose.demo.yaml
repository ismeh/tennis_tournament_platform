services:
  nginx:
    image: nginx:alpine
    container_name: tfm-nginx
    restart: unless-stopped
    ports:
      - "${HTTPS_HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SERVER_NAME: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env}
      BACKEND_UPSTREAM: http://backend:${BACKEND_PORT:-8080}
      FRONTEND_UPSTREAM: http://frontend:4000
      SSL_CERTIFICATE: /etc/letsencrypt/live/${PUBLIC_DOMAIN}/fullchain.pem
      SSL_CERTIFICATE_KEY: /etc/letsencrypt/live/${PUBLIC_DOMAIN}/privkey.pem
    volumes:
      - ./infra/nginx/templates/demo.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./infra/nginx/certbot/conf:/etc/letsencrypt
      - ./infra/nginx/certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot:latest
    container_name: tfm-certbot
    volumes:
      - ./infra/nginx/certbot/conf:/etc/letsencrypt
      - ./infra/nginx/certbot/www:/var/www/certbot

  backend:
    environment:
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      FRONTEND_CONFIRMATION_URL: ${FRONTEND_CONFIRMATION_URL:?Set FRONTEND_CONFIRMATION_URL in .env}

  frontend:
    environment:
      API_URL: ${FRONTEND_API_URL:?Set FRONTEND_API_URL in .env}
      NG_ALLOWED_HOSTS: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env}
