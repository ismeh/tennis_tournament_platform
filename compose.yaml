services:
  postgres:
    container_name: tfm-postgres
    image: postgres:18
    restart: always
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-demo-tfm}
      POSTGRES_USER: ${DB_USER:-postgres-tfm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres-tfm} -d ${DB_NAME:-demo-tfm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend/src/main/resources/sql_scripts/schema-postgre.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/sql_scripts/data-postgre.sql:/docker-entrypoint-initdb.d/02-data.sql
      - postgres_data:/var/lib/postgresql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tfm-backend
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - BACKEND_PROFILE=${BACKEND_PROFILE:-dev}
      - SPRING_PROFILES_ACTIVE=${BACKEND_PROFILE:-dev}
      - DATASOURCE_URL=${DATASOURCE_URL:-jdbc:postgresql://postgres:5432/demo-tfm}
      - DB_USER=${DB_USER:-postgres-tfm}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tfm-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - NG_ALLOWED_HOSTS=${FRONTEND_ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      - backend

volumes:
  postgres_data:
