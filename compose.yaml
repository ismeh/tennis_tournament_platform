services:
  postgres:
    container_name: tfm-postgres
    image: postgres:18
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-demo-tfm}
      POSTGRES_USER: ${DB_USER:-postgres-tfm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres-tfm} -d ${DB_NAME:-demo-tfm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  backend:
    image: ${DOCKER_USERNAME:-ismeh}/tennis-backend:latest
    pull_policy: always
    container_name: tfm-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - BACKEND_PROFILE=${BACKEND_PROFILE:-dev}
      - SPRING_PROFILES_ACTIVE=${BACKEND_PROFILE:-dev}
      - DATASOURCE_URL=${DATASOURCE_URL:-jdbc:postgresql://postgres:5432/demo-tfm}
      - DB_USER=${DB_USER:-postgres-tfm}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my_very_secret_and_long_key_for_tennis_platform_tfm_project}
      - EMAIL_CONFIRMATION_REQUIRED=${EMAIL_CONFIRMATION_REQUIRED:-true}
      - EMAIL_CONFIRMATION_ENABLED=${EMAIL_CONFIRMATION_ENABLED:-false}
      - EMAIL_FROM=${EMAIL_FROM:-no-reply@tennis-platform.local}
      - FRONTEND_CONFIRMATION_URL=${FRONTEND_CONFIRMATION_URL:-http://localhost:4200/confirmar-email}
      - EMAIL_CONFIRMATION_TOKEN_EXPIRATION_MINUTES=${EMAIL_CONFIRMATION_TOKEN_EXPIRATION_MINUTES:-1440}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-true}
      - MAIL_SMTP_STARTTLS_ENABLE=${MAIL_SMTP_STARTTLS_ENABLE:-true}
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=${FLYWAY_BASELINE_ON_MIGRATE:-true}
      - SPRING_FLYWAY_BASELINE_VERSION=${FLYWAY_BASELINE_VERSION:-0}
      - PRO_PLAYERS_IMPORT_ENABLED=${PRO_PLAYERS_IMPORT_ENABLED:-false}
      - PRO_PLAYERS_IMPORT_RUN_ON_STARTUP=${PRO_PLAYERS_IMPORT_RUN_ON_STARTUP:-false}
      - PRO_PLAYERS_IMPORT_CRON=${PRO_PLAYERS_IMPORT_CRON:-0 0 4 * * MON}
      - PRO_PLAYERS_IMPORT_BATCH_SIZE=${PRO_PLAYERS_IMPORT_BATCH_SIZE:-1000}
      - PRO_PLAYERS_MALE_CSV_LOCATION=${PRO_PLAYERS_MALE_CSV_LOCATION:-classpath:db/seed/pro_players_male.csv}
      - PRO_PLAYERS_FEMALE_CSV_LOCATION=${PRO_PLAYERS_FEMALE_CSV_LOCATION:-classpath:db/seed/pro_players_female.csv}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - GOOGLE_PLACES_BASE_URL=${GOOGLE_PLACES_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
  
  frontend:
    image: ${DOCKER_USERNAME:-ismeh}/tennis-frontend:latest
    pull_policy: always
    container_name: tfm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - API_URL=${FRONTEND_API_URL:-http://localhost:${BACKEND_PORT:-8080}/api}
      - PRODUCTION=true
      - NG_ALLOWED_HOSTS=${FRONTEND_ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      - backend

volumes:
  postgres_data:
