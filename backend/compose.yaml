services:
  postgres:
    container_name: tfm-postgres
    image: postgres:18
    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres-tfm
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: demo-tfm
    volumes:
      - ./src/main/resources/sql_scripts/schema-postgre.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/sql_scripts/00test-postgree.sql:/docker-entrypoint-initdb.d/00-schema.sql
      - ./src/main/resources/sql_scripts/data-postgre.sql:/docker-entrypoint-initdb.d/02-data.sql
      - postgres_data:/var/lib/postgresql # Persistencia de datos
  #https://docs.docker.com/guides/pgadmin/?uuid=8E733685-75E6-42D3-AF38-81DF0CF12C54
  pgadmin:
    container_name: tfm-pgadmin
    image: dpage/pgadmin4:9.13
    ports:
      - 5050:80
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

volumes:
  postgres_data:

