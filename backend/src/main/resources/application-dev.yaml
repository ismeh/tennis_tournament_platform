spring:
  main:
    lazy-initialization: true # Speed up startup time by deferring bean initialization until needed
  datasource:
    url: ${DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: false # true: modifies the default Spring Boot behavior and populates the data after the schema is generated by Hibernate
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none # update: Automatically update the database schema to match the entity definitions
logging:
  level:
    org.springframework.web: "info"
    org.hibernate: "error"
  file:
    name: logs/prod-application.log
  pattern:
    level: "%5p [req-id: %X{correlationId}]"
server:
  port: 8085