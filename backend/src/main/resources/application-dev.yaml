spring:
  main:
    lazy-initialization: true # Speed up startup time by deferring bean initialization until needed
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    defer-datasource-initialization: true # modifies the default Spring Boot behavior and populates the data after the schema is generated by Hibernate
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # Automatically update the database schema to match the entity definitions
  h2:
    console:
      enabled: true
      path: /h2-console
      settings.trace: false # Disable SQL statement tracing for better performance
      settings.web-allow-others: false # Restrict access to the H2 console to localhost only
  sql:
    init:
      data-locations: classpath:sql_scripts/schema_data_test.sql
      mode: always # Always initialize the database with the specified SQL script
server:
  port: 8085