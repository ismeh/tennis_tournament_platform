spring:
  main:
    lazy-initialization: true # Speed up startup time by deferring bean initialization until needed
  datasource:
    url: ${DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: false # true: modifies the default Spring Boot behavior and populates the data after the schema is generated by Hibernate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none # update: Automatically update the database schema to match the entity definitions
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration,classpath:db/seed,classpath:db/seed/prod
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}
logging:
  level:
    org.springframework.web: "info"
    org.hibernate: "error"
    com.tfm.tennis_platform.application.services: "info"
    com.tfm.tennis_platform.infrastructure.observability: "info"
  file:
    name: logs/prod-application.log
  pattern:
    level: "%5p [req-id: %X{correlationId}]"
server:
  port: ${BACKEND_PORT:8080}
